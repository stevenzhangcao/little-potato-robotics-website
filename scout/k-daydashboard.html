  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #1a1d23;
      color: #e6e8ec;
      min-height: 100vh;
    }
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: #fff;
    }
    .subtitle {
      color: #8b9199;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .file-wrap {
      position: relative;
    }
    .file-wrap input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: #2d3239;
      color: #e6e8ec;
    }
    .btn:hover {
      background: #3d434c;
    }
    .btn-primary {
      background: #1976d2;
      color: #fff;
    }
    .btn-primary:hover {
      background: #1565c0;
    }
    .summary {
      font-size: 0.9rem;
      color: #8b9199;
    }
    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2d3239;
      background: #22262d;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid #2d3239;
    }
    th {
      position: sticky;
      top: 0;
      background: #2d3239;
      color: #b0b5bb;
      font-weight: 600;
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
    }
    th:hover {
      background: #3d434c;
      color: #fff;
    }
    th .sort-icon {
      margin-left: 0.25rem;
      opacity: 0.6;
      font-size: 0.75rem;
    }
    th.sorted-asc .sort-icon::after { content: ' ▲'; }
    th.sorted-desc .sort-icon::after { content: ' ▼'; }
    tbody tr:hover {
      background: rgba(255,255,255,0.03);
    }
    td {
      color: #d0d4d9;
    }
    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    td a.team-link {
      color: #5ba3f5;
      text-decoration: none;
    }
    td a.team-link:hover {
      text-decoration: underline;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #6b7280;
    }
    .empty-state p { margin: 0.5rem 0; }
  </style>

  <script>
    (function () {
      const fileInput = document.getElementById('file');
      const thead = document.getElementById('thead');
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      const summary = document.getElementById('summary');

      let data = [];
      let columns = [];
      let sortCol = -1;
      let sortAsc = true;

      function parseCSV(text) {
        const rows = [];
        let cur = [];
        let cell = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (inQuotes) {
            cell += ch;
          } else if (ch === ',' || ch === '\n' || ch === '\r') {
            if (ch === ',' || ch === '\n') {
              cur.push(cell.trim());
              cell = '';
            }
            if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
              if (cur.length) rows.push(cur);
              cur = [];
              if (ch === '\r') i++;
            }
          } else {
            cell += ch;
          }
        }
        if (cell || cur.length) {
          cur.push(cell.trim());
          rows.push(cur);
        }
        return rows;
      }

      function isNumeric(val) {
        if (val === '' || val == null) return false;
        return !isNaN(Number(val)) && isFinite(Number(val));
      }

      function compare(a, b, colIdx) {
        const ac = a[colIdx];
        const bc = b[colIdx];
        const an = isNumeric(ac) ? Number(ac) : null;
        const bn = isNumeric(bc) ? Number(bc) : null;
        if (an != null && bn != null) return an - bn;
        const as = String(ac ?? '');
        const bs = String(bc ?? '');
        return as.localeCompare(bs, undefined, { numeric: true });
      }

      function sortData() {
        if (sortCol < 0 || sortCol >= columns.length) return;
        data.sort((a, b) => {
          const c = compare(a, b, sortCol);
          return sortAsc ? c : -c;
        });
      }

      const TEAM_PAGE_BASE = 'https://ftc-events.firstinspires.org/2025/team/';

      function render() {
        if (!columns.length) {
          thead.innerHTML = '';
          tbody.innerHTML = '';
          empty.style.display = 'block';
          summary.textContent = '';
          return;
        }
        empty.style.display = 'none';

        const teamColIdx = columns.findIndex(c => c.trim().toLowerCase() === 'team');

        thead.innerHTML = '<tr>' + columns.map((col, i) => {
          const isSorted = i === sortCol;
          const dir = isSorted ? (sortAsc ? 'sorted-asc' : 'sorted-desc') : '';
          return `<th class="${dir}" data-col="${i}">${escapeHtml(col)}<span class="sort-icon"></span></th>`;
        }).join('') + '</tr>';

        tbody.innerHTML = data.map(row =>
          '<tr>' + row.map((cell, i) => {
            const numClass = isNumeric(cell) ? ' num' : '';
            let content = escapeHtml(String(cell ?? ''));
            if (i === teamColIdx && cell != null && String(cell).trim() !== '') {
              const teamNum = String(cell).trim();
              const url = TEAM_PAGE_BASE + encodeURIComponent(teamNum);
              content = '<a class="team-link" href="' + url + '" target="_blank" rel="noopener">' + content + '</a>';
            }
            return '<td class="' + numClass + '">' + content + '</td>';
          }).join('') + '</tr>'
        ).join('');

        summary.textContent = data.length + ' team' + (data.length !== 1 ? 's' : '');

        thead.querySelectorAll('th').forEach(th => {
          th.addEventListener('click', () => {
            const col = parseInt(th.dataset.col, 10);
            if (sortCol === col) sortAsc = !sortAsc;
            else { sortCol = col; sortAsc = true; }
            sortData();
            render();
          });
        });
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      fileInput.addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function () {
          loadFromCSV(reader.result);
        };
        reader.readAsText(file, 'UTF-8');
      });

      function loadFromCSV(text) {
        const rows = parseCSV(text);
        if (rows.length < 2) {
          columns = [];
          data = [];
        } else {
          columns = rows[0];
          data = rows.slice(1).map(row => {
            while (row.length < columns.length) row.push('');
            return row.slice(0, columns.length);
          });
          sortCol = columns.findIndex(c => c.trim().toLowerCase() === 'total np');
          if (sortCol < 0) sortCol = 0;
          sortAsc = false;
          sortData();
        }
        render();
      }

      const embeddedEl = document.getElementById('rankings-csv');
      if (embeddedEl && embeddedEl.textContent.trim()) {
        loadFromCSV(embeddedEl.textContent.trim());
      }
    })();
  </script>
